<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/pages/static.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="page-wrapper">
    <div id="navbar-placeholder"></div>
    <section class="main-content">
      <div class="container" style="max-width:800px">
        <div class="content-header text-center" style="margin-top:20px">
          <h1>📬 Liên hệ với chúng tôi</h1>
          <p>Nếu bạn có câu hỏi hoặc góp ý, hãy gửi cho chúng tôi!</p>
        </div>
        <div class="grid grid-3 mb-3">
          <div class="card text-center"><div style="font-size:1.8rem;margin-bottom:8px">📧</div><h4>Email</h4><p style="color:var(--text-light);font-size:.85rem;margin-top:4px">support@jobviet.vn</p></div>
          <div class="card text-center"><div style="font-size:1.8rem;margin-bottom:8px">📞</div><h4>Điện thoại</h4><p style="color:var(--text-light);font-size:.85rem;margin-top:4px">0901 234 567</p></div>
          <div class="card text-center"><div style="font-size:1.8rem;margin-bottom:8px">📍</div><h4>Địa chỉ</h4><p style="color:var(--text-light);font-size:.85rem;margin-top:4px">Hà Nội, Việt Nam</p></div>
        </div>
        <div class="card" style="padding:32px">
          <h3 style="margin-bottom:20px">Gửi tin nhắn</h3>
          <form onsubmit="submitContact(event)">
            <div class="form-row">
              <div class="form-group"><label class="form-label">Họ tên</label><input class="form-input" required placeholder="Nguyễn Văn A"></div>
              <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" required placeholder="email@example.com"></div>
            </div>
            <div class="form-group"><label class="form-label">Chủ đề</label><input class="form-input" required placeholder="Nhập chủ đề"></div>
            <div class="form-group"><label class="form-label">Nội dung</label><textarea class="form-textarea" required placeholder="Nhập nội dung tin nhắn..."></textarea></div>
            <button type="submit" class="btn btn-primary btn-lg">📤 Gửi tin nhắn</button>
          </form>
        </div>
      </div>
    </section>
    <footer class="footer" id="footer"></footer>
  </div>
  <script src="navbar.js"></script>
</body>
</html>
