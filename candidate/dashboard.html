<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Ứng viên — JobViệt</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/pages/dashboard.css" />
    <link rel="stylesheet" href="../css/pages/candidate.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <div class="layout-sidebar">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content-area">
        <div class="container" style="max-width: 100%">
          <div class="content-header">
            <h1 id="greeting"></h1>
            <p>Tổng quan hoạt động của bạn</p>
          </div>
          <div class="grid grid-5 stagger" id="stats"></div>
          <div class="grid grid-2 mt-3">
            <div>
              <h3 class="mb-2">
                <i class="fa-solid fa-calendar-check text-indigo"></i> Lịch phỏng vấn sắp tới
              </h3>
              <div id="upcomingInterviews"></div>
              <a href="interviews.html" class="btn btn-ghost mt-2">Xem tất cả →</a>
            </div>
            <div>
              <h3 class="mb-2">
                <i class="fa-solid fa-envelope-open-text text-primary"></i> Việc
                đã ứng tuyển gần đây
              </h3>
              <div id="recentApps"></div>
              <a href="my-applications.html" class="btn btn-ghost mt-2"
                >Xem tất cả →</a
              >
            </div>
            <div>
              <h3 class="mb-2">
                <i class="fa-solid fa-heart text-danger"></i> Việc đã lưu
              </h3>
              <div id="savedList"></div>
              <a href="saved-jobs.html" class="btn btn-ghost mt-2"
                >Xem tất cả →</a
              >
            </div>
          </div>
          <div class="mt-3">
            <div class="flex-between mb-2">
              <h3>
                <i class="fa-solid fa-briefcase text-success"></i> Gợi ý việc
                làm
              </h3>
              <a href="../public/job-list.html" class="btn btn-ghost"
                >Xem tất cả →</a
              >
            </div>
            <div class="grid grid-2 stagger" id="suggested"></div>
          </div>
        </div>
      </main>
    </div>
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/navbar.js"></script>
    <script>
      const user = Auth.requireAuth(["candidate"]);
      if (!user) throw "redirect";
      App.renderSidebar("candidate", "dashboard");

      document.getElementById("greeting").textContent =
        `👋 Xin chào, ${user.fullName}!`;

      const apps = DB.getApplicationsByCandidate(user.id);
      const saved = DB.getSavedJobs(user.id);

      const interviews = apps
        .filter(a => a.status === "interview_scheduled")
        .map(a => DB.getInterviewByApplication(a.id))
        .filter(i => i);

      // Stats
      document.getElementById("stats").innerHTML = `
      <div class="stat-card animate-fade-up"><div class="stat-icon blue"><i class="fa-solid fa-envelope-open-text"></i></div><div class="stat-value">${apps.length}</div><div class="stat-label">Đã ứng tuyển</div></div>
      <div class="stat-card animate-fade-up"><div class="stat-icon purple"><i class="fa-solid fa-calendar-days"></i></div><div class="stat-value">${interviews.length}</div><div class="stat-label">Lịch phỏng vấn</div></div>
      <div class="stat-card animate-fade-up"><div class="stat-icon green"><i class="fa-solid fa-circle-check"></i></div><div class="stat-value">${apps.filter((a) => a.status === "accepted").length}</div><div class="stat-label">Trúng tuyển</div></div>
      <div class="stat-card animate-fade-up"><div class="stat-icon orange"><i class="fa-solid fa-hourglass-half"></i></div><div class="stat-value">${apps.filter((a) => a.status === "pending").length}</div><div class="stat-label">Đang chờ</div></div>
      <div class="stat-card animate-fade-up"><div class="stat-icon red"><i class="fa-solid fa-heart"></i></div><div class="stat-value">${saved.length}</div><div class="stat-label">Đã lưu</div></div>
    `;

      // Upcoming interviews
      const upcoming = interviews.slice(-3).reverse();
      document.getElementById("upcomingInterviews").innerHTML = upcoming.length
        ? upcoming.map(i => {
            const job = DB.getJobById(DB.getApplicationById(i.applicationId).jobId);
            return `<div class="card job-card-dashboard mb-1" style="border-left: 3px solid var(--primary);"><div class="flex-between"><div><strong>${job ? job.title : 'N/A'}</strong><br><span class="job-meta-mini">${i.date} @ ${i.time}</span></div><span class="badge badge-warning">${i.type}</span></div></div>`;
          }).join('')
        : '<div class="empty-state" style="padding:20px"><p>Chưa có lịch phỏng vấn</p></div>';

      // Recent applications
      const recentApps = apps.slice(-3).reverse();
      document.getElementById("recentApps").innerHTML = recentApps.length
        ? recentApps
            .map((a) => {
              const job = DB.getJobById(a.jobId);
              const statusMap = {
                pending: [
                  '<i class="fa-solid fa-hourglass-half"></i> Đang chờ',
                  "badge-warning",
                ],
                accepted: [
                  '<i class="fa-solid fa-circle-check"></i> Chấp nhận',
                  "badge-success",
                ],
                rejected: [
                  '<i class="fa-solid fa-circle-xmark"></i> Từ chối',
                  "badge-danger",
                ],
              };
              const [label, cls] = statusMap[a.status] || statusMap.pending;
              return `<div class="card job-card-dashboard mb-1"><div class="flex-between"><div><strong>${job ? job.title : "N/A"}</strong><br><span class="job-meta-mini">${job ? job.companyName : ""} · ${App.timeAgo(a.appliedAt)}</span></div><span class="badge ${cls}">${label}</span></div></div>`;
            })
            .join("")
        : '<div class="empty-state" style="padding:30px"><div class="empty-icon"><i class="fa-solid fa-inbox"></i></div><p>Chưa ứng tuyển việc nào</p></div>';

      // Saved jobs
      document.getElementById("savedList").innerHTML = saved.length
        ? saved
            .slice(-3)
            .reverse()
            .map((s) => {
              const job = DB.getJobById(s.jobId);
              if (!job) return "";
              return `<div class="card job-card-dashboard mb-1"><div class="flex-between"><div><strong>${job.title}</strong><br><span class="job-meta-mini">${job.companyName} · ${job.salary}</span></div><button onclick="App.viewJob('${job.id}')" class="btn btn-sm btn-primary">Xem</button></div></div>`;
            })
            .join("")
        : '<div class="empty-state" style="padding:30px"><div class="empty-icon"><i class="fa-solid fa-floppy-disk"></i></div><p>Chưa lưu việc nào</p></div>';

      // Suggested jobs
      const allJobs = DB.getJobs()
        .filter((j) => j.status === "active")
        .slice(-4);
      document.getElementById("suggested").innerHTML = allJobs
        .map(
          (job) => `
      <div class="job-card animate-fade-up">
        <div class="job-title">${job.title}</div>
        <div class="job-company">${job.companyName}</div>
        <div class="job-meta"><span><i class="fa-solid fa-location-dot text-danger"></i> ${job.location}</span><span><i class="fa-solid fa-money-bill-wave text-success"></i> ${job.salary}</span></div>
        <div class="job-actions"><button onclick="App.viewJob('${job.id}')" class="btn btn-sm btn-primary">Xem chi tiết</button></div>
      </div>
    `,
        )
        .join("");
    </script>
  </body>
</html>
