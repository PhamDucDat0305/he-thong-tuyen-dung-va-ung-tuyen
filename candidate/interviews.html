<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Lịch phỏng vấn của tôi — JobViệt</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/pages/dashboard.css" />
    <link rel="stylesheet" href="../css/pages/candidate.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <div class="layout-sidebar">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content-area">
        <div class="content-header">
          <h1><i class="fa-solid fa-calendar-days text-primary"></i> Lịch phỏng vấn của tôi</h1>
          <p>Danh sách các buổi phỏng vấn đã được nhà tuyển dụng sắp xếp</p>
        </div>

        <div id="interviewList" class="stagger">
          <!-- Interviews will be rendered here -->
        </div>
      </main>
    </div>

    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/navbar.js"></script>
    <script>
      const user = Auth.requireAuth(["candidate"]);
      if (!user) throw "redirect";
      App.renderSidebar("candidate", "interviews");
      BadgeNotifier.markSeen(user.id, "cand_interviews");

      function renderInterviews() {
        const apps = DB.getApplicationsByCandidate(user.id).filter(a => a.status === "interview_scheduled");
        const interviews = apps
          .map(a => {
            const interview = DB.getInterviewByApplication(a.id);
            if (interview) {
              const job = DB.getJobById(a.jobId);
              return { ...interview, jobTitle: job ? job.title : 'N/A', companyName: job ? job.companyName : 'N/A' };
            }
            return null;
          })
          .filter(i => i !== null)
          .sort((a, b) => new Date(a.date + ' ' + a.time) - new Date(b.date + ' ' + b.time));

        const container = document.getElementById("interviewList");
        
        if (!interviews.length) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon"><i class="fa-solid fa-calendar-xmark"></i></div>
              <h3>Chưa có lịch phỏng vấn nào</h3>
              <p>Các lịch hẹn phỏng vấn sẽ xuất hiện ở đây khi nhà tuyển dụng mời bạn.</p>
            </div>
          `;
          return;
        }

        container.innerHTML = interviews.map(i => `
          <div class="card animate-fade-up mb-2" style="padding: 20px; border-left: 4px solid var(--primary);">
            <div class="flex-between flex-wrap" style="gap: 15px;">
              <div>
                <h3 style="margin-bottom: 5px;">${i.jobTitle}</h3>
                <div style="color: var(--primary); font-weight: 600; margin-bottom: 10px;">${i.companyName}</div>
                <div style="display: grid; gap: 8px; font-size: 0.95rem;">
                  <span><i class="fa-solid fa-calendar text-info" style="width: 20px;"></i> <strong>Ngày:</strong> ${App.formatDate(i.date)}</span>
                  <span><i class="fa-solid fa-clock text-warning" style="width: 20px;"></i> <strong>Giờ:</strong> ${i.time}</span>
                  <span><i class="fa-solid fa-video text-success" style="width: 20px;"></i> <strong>Hình thức:</strong> ${i.type === 'online' ? 'Phỏng vấn Online' : 'Phỏng vấn Trực tiếp'}</span>
                </div>
              </div>
              <div class="flex-column" style="align-items: flex-end; gap: 10px;">
                <span class="badge badge-warning">Sắp diễn ra</span>
                <div class="flex" style="gap:8px">
                  <button onclick="App.openChat('${i.createdBy}')" class="btn btn-sm btn-info" title="Nhắn tin"><i class="fa-solid fa-comments"></i> Nhắn tin</button>
                  <button class="btn btn-sm btn-outline" onclick="viewDetails('${i.id}')">Xem ghi chú</button>
                </div>
              </div>
            </div>
            ${i.notes ? `
              <div id="notes_${i.id}" style="margin-top: 15px; padding: 12px; background: #f8fafc; border-radius: 8px; font-size: 0.9rem; display: none;">
                <strong style="color: var(--text-light);">Ghi chú/Địa điểm:</strong><br>
                <div style="margin-top: 5px; white-space: pre-line;">${i.notes}</div>
              </div>
            ` : ''}
          </div>
        `).join('');
      }

      function viewDetails(id) {
        const notes = document.getElementById('notes_' + id);
        if (notes) {
          notes.style.display = notes.style.display === 'none' ? 'block' : 'none';
        } else {
          Toast.info("Không có ghi chú thêm cho buổi phỏng vấn này.");
        }
      }

      renderInterviews();
    </script>
  </body>
</html>
