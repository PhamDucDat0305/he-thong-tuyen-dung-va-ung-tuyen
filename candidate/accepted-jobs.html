<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Việc làm đã được nhận — JobViệt</title>
  <link rel="stylesheet" href="../css/styles.css"><link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/pages/dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body><div id="navbar-placeholder"></div>
  <div class="layout-sidebar">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content-area">
      <div class="content-header">
        <h1><i class="fa-solid fa-circle-check text-success"></i> Việc làm đã được nhận</h1>
        <p>Chúc mừng! Đây là danh sách các công việc bạn đã trúng tuyển.</p>
      </div>

      <div class="grid grid-2 stagger" id="acceptedJobs">
        <!-- Rendered by JS -->
      </div>
    </main>
  </div>
  <script src="../js/db.js"></script><script src="../js/auth.js"></script><script src="../js/notifications.js"></script><script src="../js/app.js"></script><script src="../js/navbar.js"></script>
  <script>
    const user = Auth.requireAuth(['candidate']);
    if (!user) throw 'r';
    App.renderSidebar('candidate', 'accepted');

    function render() {
      const apps = DB.getApplicationsByCandidate(user.id).filter(a => a.status === 'accepted');
      const container = document.getElementById('acceptedJobs');

      if (!apps.length) {
        container.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1; padding: 60px;">
            <div class="empty-icon"><i class="fa-solid fa-face-smile"></i></div>
            <h3>Chưa có việc làm nào được nhận</h3>
            <p>Hãy tiếp tục ứng tuyển để tìm kiếm cơ hội nhé!</p>
            <a href="../public/job-list.html" class="btn btn-primary mt-2">Tìm việc ngay</a>
          </div>
        `;
        return;
      }

      container.innerHTML = apps.map(a => {
        const job = DB.getJobById(a.jobId);
        if (!job) return '';
        return `
          <div class="card animate-fade-up" style="padding: 24px; border-left: 4px solid var(--success);">
            <div class="flex-between mb-2">
              <div>
                <h3 style="margin-bottom:4px">${job.title}</h3>
                <p style="color:var(--primary); font-weight:600">${job.companyName}</p>
              </div>
              <span class="badge badge-success"><i class="fa-solid fa-circle-check"></i> Đã trúng tuyển</span>
            </div>
            <div style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 16px;">
              <div><i class="fa-solid fa-location-dot"></i> ${job.location} &nbsp;·&nbsp; <i class="fa-solid fa-money-bill-wave"></i> ${job.salary}</div>
              <div style="margin-top: 4px;"><i class="fa-solid fa-calendar-day"></i> Ngày nhận: ${App.formatDate(a.updatedAt || a.appliedAt)}</div>
            </div>
            <div class="flex" style="gap: 10px;">
              <button class="btn btn-sm btn-primary" onclick="App.viewJob('${job.id}')">Xem chi tiết</button>
              <button class="btn btn-sm btn-outline" onclick="Toast.success('Hệ thống sẽ gửi thông tin liên hệ chi tiết qua email của bạn.')">Liên hệ nhà tuyển dụng</button>
            </div>
          </div>
        `;
      }).join('');
    }

    render();
  </script>
</body>
</html>
