<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ứng tuyển — JobViệt</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <nav class="navbar" id="navbar"></nav>
    <section class="main-content">
      <div class="container" style="max-width:700px">
        <a href="javascript:history.back()" class="btn btn-ghost mb-2">← Quay lại</a>
        <div class="card animate-fade-up" style="padding:32px" id="applyCard"></div>
      </div>
    </section>
    <footer class="footer" id="footer"></footer>
  </div>
  <script src="../js/db.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/app.js"></script>
  <script>
    const user = Auth.requireAuth(['candidate']);
    App.renderNavbar('jobs'); App.renderFooter();

    const jobId = new URLSearchParams(location.search).get('id');
    const job = DB.getJobById(jobId);
    const card = document.getElementById('applyCard');

    if (!job) { card.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><h3>Không tìm thấy việc làm</h3></div>'; }
    else if (DB.hasApplied(jobId, user.id)) {
      card.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><h3>Bạn đã ứng tuyển việc này</h3><p>Theo dõi trạng thái tại trang "Việc đã ứng tuyển"</p><a href="my-applications.html" class="btn btn-primary mt-2">Xem danh sách</a></div>';
    } else {
      card.innerHTML = `
        <div style="margin-bottom:24px">
          <h2>📩 Ứng tuyển</h2>
          <p style="color:var(--text-light);margin-top:4px">${job.title} — ${job.companyName}</p>
        </div>
        <form onsubmit="submitApplication(event)">
          <div class="form-group">
            <label class="form-label">Họ và tên</label>
            <input class="form-input" id="fullName" value="${user.fullName || ''}" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="email" value="${user.email || ''}" required>
          </div>
          <div class="form-group">
            <label class="form-label">Giới thiệu bản thân / CV</label>
            <textarea class="form-textarea" id="cv" rows="6" required placeholder="Mô tả kinh nghiệm, kỹ năng, lý do bạn phù hợp với vị trí này..."></textarea>
            <p class="form-hint">Viết về kinh nghiệm và kỹ năng liên quan đến công việc</p>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-block">📤 Gửi ứng tuyển</button>
        </form>
      `;
    }

    function submitApplication(e) {
      e.preventDefault();
      DB.createApplication({
        jobId: jobId,
        candidateId: user.id,
        fullName: document.getElementById('fullName').value.trim(),
        email: document.getElementById('email').value.trim(),
        cv: document.getElementById('cv').value.trim()
      });
      Toast.success('🎉 Ứng tuyển thành công! Nhà tuyển dụng sẽ xem hồ sơ của bạn.');
      setTimeout(() => { location.href = 'my-applications.html'; }, 1500);
    }
  </script>
</body>
</html>
