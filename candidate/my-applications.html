    <title>Việc làm đã ứng tuyển — JobViệt</title>

    <link rel="stylesheet" href="../css/navbar.css" />

      rel="stylesheet"

    />

  <body>
    <div id="navbar-placeholder"></div>
    <div class="layout-sidebar">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content-area">
        <div class="content-header">
          <h1>
            <i class="fa-solid fa-envelope-open-text"></i> Việc làm đã ứng tuyển
          </h1>
          <p>Theo dõi trạng thái các hồ sơ bạn đã nộp</p>
        </div>

        <div class="card mb-3">
          <h3 class="mb-2">
            <i class="fa-solid fa-hourglass-half text-warning"></i> Đang chờ
            duyệt
          </h3>
          <div class="table-wrapper">
            <table class="table">
              <tbody id="pendingList"></tbody>
            </table>
          </div>
        </div>

        <div class="card mb-3">
          <h3 class="mb-2">
            <i class="fa-solid fa-circle-check text-success"></i> Đã trúng tuyển
          </h3>
          <div class="table-wrapper">
            <table class="table">
              <tbody id="acceptedList"></tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <h3 class="mb-2">
            <i class="fa-solid fa-list-check text-info"></i> Tất cả hồ sơ đã nộp
          </h3>
          <div class="table-wrapper">
            <table class="table">
              <thead>
                <tr>
                  <th>Công việc</th>
                  <th>Công ty</th>
                  <th>Ngày nộp</th>
                  <th>Trạng thái</th>
                  <th>Hành động</th>
                </tr>
              </thead>
              <tbody id="appliedJobsList"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="../js/db.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script src="../js/notifications.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script src="../js/navbar.js"></script>
    <script type="module">
      document.addEventListener("DOMContentLoaded", async () => {
        // Wait for modules to initialize
        await new Promise(r => setTimeout(r, 100));

        const user = window.Auth.requireAuth(["candidate"]);
        if (!user) return;
        window.App.renderSidebar("candidate", "my_apps");
        
        if (window.BadgeNotifier) {
          window.BadgeNotifier.markSeen(user.id, "cand_apps");
        }

        document.getElementById("pendingList").innerHTML = "<tr><td colspan='5' class='text-center'>Đang tải...</td></tr>";
        document.getElementById("acceptedList").innerHTML = "<tr><td colspan='5' class='text-center'>Đang tải...</td></tr>";
        document.getElementById("appliedJobsList").innerHTML = "<tr><td colspan='5' class='text-center'>Đang tải...</td></tr>";

        const statusMap = {
          applied: ['<i class="fa-solid fa-envelope"></i> Đã nộp hồ sơ', "badge-info"],
          interview_scheduled: ['<i class="fa-solid fa-calendar-check"></i> Đang phỏng vấn', "badge-warning"],
          accepted: ['<i class="fa-solid fa-circle-check"></i> Trúng tuyển', "badge-success"],
          rejected: ['<i class="fa-solid fa-circle-xmark"></i> Từ chối', "badge-danger"],
          failed: ['<i class="fa-solid fa-user-xmark"></i> Không đạt', "badge-dark"],
        };

        async function renderLists(allApps) {
          allApps.sort((a, b) => new Date(b.appliedAt) - new Date(a.appliedAt));
          
          await renderList("pendingList", allApps.filter((a) => ["applied", "interview_scheduled"].includes(a.status)));
          await renderList("acceptedList", allApps.filter((a) => a.status === "accepted"));
          await renderList("appliedJobsList", allApps);
        }

        async function renderList(targetId, filtered) {
          const container = document.getElementById(targetId);

          if (!filtered.length) {
            container.innerHTML = `<tr><td colspan="5" class="text-center empty-list-text">Trống</td></tr>`;
            return;
          }

          const rows = [];
          for (const a of filtered) {
             const job = await window.DB.getJobById(a.jobId);
             const [label, cls] = statusMap[a.status] || ["Chưa rõ", "badge-neutral"];
             let extraInfo = "";

             if (a.status === "interview_scheduled") {
               const interview = await window.DB.getInterviewByApplication(a.id);
               if (interview) {
                 extraInfo = `<div class="interview-info"><i class="fa-solid fa-clock"></i> ${interview.date} · ${interview.time} (${interview.type})</div>`;
               }
             }

             rows.push(`
              <tr>
                <td data-label="Công việc"><strong>${job ? job.title : "Tin đã gỡ"}</strong>${extraInfo}</td>
                <td data-label="Công ty">${job ? job.companyName : "-"}</td>
                <td data-label="Ngày nộp">${window.App.formatDate(a.appliedAt)}</td>
                <td data-label="Trạng thái"><span class="badge ${cls}">${label}</span></td>
                <td data-label="Hành động">${job ? `<button onclick="window.location.href='../job-detail.html?id=${job.id}'" class="btn btn-sm btn-ghost">Xem lại tin</button>` : ""}</td>
              </tr>
             `);
          }
          container.innerHTML = rows.join("");
        }

        // Start realtime listener
        const unsubscribe = window.DB.onApplicationsByCandidate(user.id, (apps) => {
          renderLists(apps);
        });
        
        window.addEventListener('unload', () => unsubscribe());
      });
    </script>
  </body>
</html>
