<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Cover Letter — JobViệt</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/pages/dashboard.css" />
    <link rel="stylesheet" href="../css/pages/candidate.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <div class="layout-sidebar">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content-area">
        <div class="content-header flex-between">
          <div>
            <h1>✉️ Cover Letter</h1>
            <p>Tạo và lưu trữ các mẫu thư giới thiệu để gửi kèm CV</p>
          </div>
          <button
            class="btn btn-primary"
            onclick="Toast.info('Đang mở trình tạo Cover Letter')"
          >
            + Thêm mới
          </button>
        </div>

        <div class="card animate-fade-up">
          <h3 class="mb-2">Mẫu IT - Frontend</h3>
          <p class="cover-letter-preview">
            Kính gửi Ban Tuyển dụng,<br /><br />Tôi viết thư này để bày tỏ sự
            quan tâm đến vị trí Frontend Developer...
          </p>
          <div class="flex" style="gap: 12px">
            <button class="btn btn-sm btn-primary">Chỉnh sửa</button>
            <button class="btn btn-sm btn-danger">Xóa</button>
          </div>
        </div>
      </main>
    </div>
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/navbar.js"></script>
    <script>
      const user = Auth.requireAuth(["candidate"]);
      if (!user) throw "redirect";
      App.renderSidebar("candidate", "cover_letter");
    </script>
  </body>
</html>
