<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Cài đặt bảo mật — JobViệt</title>
  <link rel="stylesheet" href="../css/styles.css"><link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/pages/dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body><div id="navbar-placeholder"></div>
  <div class="layout-sidebar">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content-area">
      <div class="content-header">
        <h1><i class="fa-solid fa-shield-halved"></i> Cài đặt bảo mật</h1>
        <p>Thay đổi mật khẩu và thiết lập quyền riêng tư hồ sơ</p>
      </div>

      <div class="grid grid-2 stagger">
        <!-- Đổi mật khẩu -->
        <div class="card animate-fade-up">
          <h3 class="mb-2"><i class="fa-solid fa-key"></i> Đổi mật khẩu</h3>
          <form onsubmit="changePassword(event)">
            <div class="form-group">
              <label class="form-label">Mật khẩu hiện tại</label>
              <input type="password" class="form-input" id="oldPass" required>
            </div>
            <div class="form-group">
              <label class="form-label">Mật khẩu mới</label>
              <input type="password" class="form-input" id="newPass" required minlength="6">
            </div>
            <div class="form-group">
              <label class="form-label">Xác nhận mật khẩu mới</label>
              <input type="password" class="form-input" id="confirmPass" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary w-100" style="margin-top:10px">Cập nhật mật khẩu</button>
          </form>
        </div>

        <!-- Quyền riêng tư -->
        <div class="card animate-fade-up" style="animation-delay: 0.2s">
          <h3 class="mb-2"><i class="fa-solid fa-eye"></i> Quyền riêng tư hồ sơ</h3>
          <p style="color:var(--text-light);font-size:0.9rem;margin-bottom:16px">Cho phép nhà tuyển dụng tìm thấy hồ sơ của bạn trên hệ thống.</p>
          
          <div class="flex-between" style="padding:16px; background:#f0f9ff; border-radius:8px; border:1px solid #bae6fd">
            <div>
              <strong>Trạng thái tìm việc</strong><br>
              <span style="font-size:0.85rem;color:var(--text-light)" id="statusText">Đang bật (Nhà tuyển dụng có thể tìm thấy bạn)</span>
            </div>
            <button class="btn btn-sm btn-primary" id="btnToggleStatus" onclick="toggleStatus()">Tắt</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/db.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/app.js"></script><script src="../js/navbar.js"></script>
  <script>
    const user = Auth.requireAuth(['candidate']);
    if (!user) throw 'redirect';
    App.renderSidebar('candidate', 'security');

    function changePassword(e) {
      e.preventDefault();
      const oldP = document.getElementById('oldPass').value;
      const newP = document.getElementById('newPass').value;
      const confirmP = document.getElementById('confirmPass').value;

      if(newP !== confirmP) {
        Toast.error("Mật khẩu xác nhận không khớp!");
        return;
      }

      const users = JSON.parse(localStorage.getItem('users')) || [];
      const dbUser = users.find(u => u.id === user.id);

      if(!dbUser || dbUser.password !== oldP) {
        Toast.error("Mật khẩu hiện tại không đúng!");
        return;
      }

      dbUser.password = newP;
      localStorage.setItem('users', JSON.stringify(users));
      Toast.success("Đổi mật khẩu thành công!");
      e.target.reset();
    }

    let searchStatus = true;
    function toggleStatus() {
      searchStatus = !searchStatus;
      document.getElementById('statusText').textContent = searchStatus ? "Đang bật (Nhà tuyển dụng có thể tìm thấy bạn)" : "Đã tắt (Hồ sơ của bạn đang bị ẩn)";
      document.getElementById('btnToggleStatus').textContent = searchStatus ? "Tắt" : "Bật";
      document.getElementById('btnToggleStatus').className = searchStatus ? "btn btn-sm btn-primary" : "btn btn-sm btn-outline";
      Toast.success("Đã cập nhật trạng thái tìm việc");
    }
  </script>
</body>
</html>
