<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Hồ sơ công ty — JobViệt</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/pages/dashboard.css" />
    <link rel="stylesheet" href="../css/pages/employer.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <div class="layout-sidebar">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content-area">
        <div class="content-header flex-between">
          <div>
            <h1><i class="fa-solid fa-building"></i> Hồ sơ công ty</h1>
          </div>
          <a href="edit-company.html" class="btn btn-primary"
            ><i class="fa-solid fa-pen-to-square"></i> Chỉnh sửa</a
          >
        </div>
        <div
          class="card card-employer-form"
          id="companyCard"
        ></div>
      </main>
    </div>
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/navbar.js"></script>
    <script>
      const user = Auth.requireAuth(["employer"]);
      if (!user) throw "r";
      App.renderSidebar("employer", "company");
      const company = DB.getCompanyByEmployer(user.id);
      if (!company) {
        document.getElementById("companyCard").innerHTML =
          '<p>Chưa có hồ sơ. <a href="edit-company.html">Tạo ngay</a></p>';
      } else {
        document.getElementById("companyCard").innerHTML = `
        <div class="text-center mb-3">
          <div class="company-logo-preview">${company.logo || '<i class="fa-solid fa-building"></i>'}</div>
          <h2>${company.name}</h2>
          ${company.industry ? `<span class="badge badge-primary mt-1">${company.industry}</span>` : ""}
        </div>
        <div class="grid" style="gap:16px">
          <div class="dashboard-list-item flex-between"><span class="item-subtitle">Mô tả</span><span style="max-width:400px;text-align:right">${company.description || "Chưa cập nhật"}</span></div>
          <div class="dashboard-list-item flex-between"><span class="item-subtitle">Quy mô</span><strong>${company.size || "Chưa cập nhật"}</strong></div>
          <div class="dashboard-list-item flex-between"><span class="item-subtitle">Địa điểm</span><strong>${company.location || "Chưa cập nhật"}</strong></div>
          <div class="dashboard-list-item flex-between"><span class="item-subtitle">Website</span><strong>${company.website || "Chưa cập nhật"}</strong></div>
        </div>`;
      }
    </script>
  </body>
</html>
