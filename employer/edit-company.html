    <title>Sửa công ty — JobViệt</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/pages/dashboard.css" />
    <link rel="stylesheet" href="../css/pages/employer.css" />

      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

  <body>
    <div id="navbar-placeholder"></div>
    <div class="layout-sidebar">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content-area">
        <div class="content-header">
          <h1>
            <i class="fa-solid fa-pen-to-square"></i> Sửa thông tin công ty
          </h1>
        </div>
        <div class="card card-employer-form">
          <form onsubmit="saveCompany(event)">
            <div class="form-group">
              <label class="form-label">Tên công ty</label
              ><input class="form-input" id="name" required />
            </div>
            <div class="form-group">
              <label class="form-label">Logo (emoji hoặc icon)</label
              ><input class="form-input" id="logo" placeholder="🏢" />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Ngành nghề</label
                ><input
                  class="form-input"
                  id="industry"
                  placeholder="Công nghệ thông tin"
                />
              </div>
              <div class="form-group">
                <label class="form-label">Quy mô</label
                ><input class="form-input" id="size" placeholder="100-500" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Địa điểm</label
                ><input class="form-input" id="location" />
              </div>
              <div class="form-group">
                <label class="form-label">Website</label
                ><input
                  class="form-input"
                  id="website"
                  placeholder="https://"
                />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Mô tả công ty</label
              ><textarea class="form-textarea" id="description"></textarea>
            </div>
            <div class="flex" style="gap: 12px">
              <button type="submit" class="btn btn-primary btn-large">
                <i class="fa-solid fa-floppy-disk"></i> Lưu</button
              ><a
                href="company-profile.html"
                class="btn btn-secondary btn-large"
                >Hủy</a
              >
            </div>
          </form>
        </div>
      </main>
    </div>
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/navbar.js"></script>
    <script>
      const user = Auth.requireAuth(["employer"]);
      if (!user) throw "r";
      App.renderSidebar("employer", "edit_company");
      const c = DB.getCompanyByEmployer(user.id) || {};
      document.getElementById("name").value = c.name || "";
      document.getElementById("logo").value = c.logo || "";
      document.getElementById("industry").value = c.industry || "";
      document.getElementById("size").value = c.size || "";
      document.getElementById("location").value = c.location || "";
      document.getElementById("website").value = c.website || "";
      document.getElementById("description").value = c.description || "";

      function saveCompany(e) {
        e.preventDefault();
        DB.updateCompany(user.id, {
          name: document.getElementById("name").value.trim(),
          logo: document.getElementById("logo").value.trim() || "🏢",
          industry: document.getElementById("industry").value.trim(),
          size: document.getElementById("size").value.trim(),
          location: document.getElementById("location").value.trim(),
          website: document.getElementById("website").value.trim(),
          description: document.getElementById("description").value.trim(),
        });
        Toast.success("Cập nhật thành công!");
        setTimeout(() => (location.href = "company-profile.html"), 800);
      }
    </script>
  </body>
</html>
