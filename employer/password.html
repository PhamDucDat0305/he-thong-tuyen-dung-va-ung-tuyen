    <title>Đổi mật khẩu — JobViệt</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/pages/dashboard.css" />

      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <div class="layout-sidebar">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content-area">
        <div class="content-header">
          <h1>🔑 Đổi mật khẩu</h1>
          <p>Đảm bảo tài khoản của bạn luôn được bảo mật</p>
        </div>

        <div class="card animate-fade-up" style="max-width: 500px">
          <form onsubmit="changePassword(event)">
            <div class="form-group">
              <label class="form-label">Mật khẩu hiện tại</label>
              <input type="password" class="form-input" id="oldPass" required />
            </div>
            <div class="form-group">
              <label class="form-label">Mật khẩu mới</label>
              <input
                type="password"
                class="form-input"
                id="newPass"
                required
                minlength="6"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Xác nhận mật khẩu mới</label>
              <input
                type="password"
                class="form-input"
                id="confirmPass"
                required
                minlength="6"
              />
            </div>
            <button
              type="submit"
              class="btn btn-primary btn-large w-100"
              style="margin-top: 10px"
            >
              🛡️ Cập nhật mật khẩu
            </button>
          </form>
        </div>
      </main>
    </div>
    <script type="module" src="../js/db.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script src="../js/notifications.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script src="../js/navbar.js"></script>
    <script type="module">
      const user = window.window.Auth.requireAuth(["employer"]);
      if (!user) throw "redirect";
      window.App.renderSidebar("employer", "password");

      function changePassword(e) {
        e.preventDefault();
        const oldP = document.getElementById("oldPass").value;
        const newP = document.getElementById("newPass").value;
        const confirmP = document.getElementById("confirmPass").value;

        if (newP !== confirmP) {
          Toast.error("Mật khẩu xác nhận không khớp!");
          return;
        }

        const users = JSON.parse(localStorage.getItem("users")) || [];
        const dbUser = users.find((u) => u.id === user.id);

        if (!dbUser || dbUser.password !== oldP) {
          Toast.error("Mật khẩu hiện tại không đúng!");
          return;
        }

        // Đổi pass
        dbUser.password = newP;
        localStorage.setItem("users", JSON.stringify(users));
        Toast.success("Đổi mật khẩu thành công!");

        // Reset form
        e.target.reset();
      }
    </script>
  </body>
