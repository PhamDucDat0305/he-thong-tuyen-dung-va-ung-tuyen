<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Ứng viên đã ứng tuyển — JobViệt</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/pages/dashboard.css">
</head>
<body>
  <div class="layout-sidebar">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content-area">
      <div class="content-header">
        <h1>📥 Ứng viên đã ứng tuyển</h1>
        <p>Danh sách tất cả các hồ sơ ứng tuyển vào công ty bạn</p>
      </div>

      <div class="table-wrapper animate-fade-up">
        <table class="table">
          <thead>
            <tr>
              <th>Ứng viên</th>
              <th>Vị trí ứng tuyển</th>
              <th>Ngày nộp</th>
              <th>Trạng thái</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="appliedList">
            <!-- Rendered by JS -->
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="../js/db.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/app.js"></script>
  <script>
    const user = Auth.requireAuth(['employer']);
    if (!user) throw 'redirect';
    App.renderSidebar('employer', 'applied');

    function render() {
      const myJobs = DB.getJobsByEmployer(user.id);
      const allApps = myJobs.flatMap(j => DB.getApplicationsByJob(j.id)).sort((a,b) => new Date(b.appliedAt)-new Date(a.appliedAt));
      
      if (!allApps.length) {
        document.getElementById('appliedList').innerHTML = '<tr><td colspan="5" class="text-center" style="padding:40px">Chưa có ứng viên nào ứng tuyển</td></tr>';
        return;
      }

      const statusMap = { pending: ['⏳ Chờ duyệt', 'badge-warning'], accepted: ['✅ Chấp nhận', 'badge-success'], rejected: ['❌ Từ chối', 'badge-danger'] };

      document.getElementById('appliedList').innerHTML = allApps.map(a => {
        const job = DB.getJobById(a.jobId);
        const [label, cls] = statusMap[a.status] || statusMap.pending;
        return `
          <tr>
            <td>
              <div class="flex" style="gap:12px">
                <div class="avatar" style="width:40px;height:40px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:bold;color:var(--text);border:1px solid var(--border)">${a.fullName[0]}</div>
                <div><strong>${a.fullName}</strong><br><span style="font-size:0.85rem;color:var(--text-light)">${a.email}</span></div>
              </div>
            </td>
            <td><strong>${job ? job.title : 'Đã xóa'}</strong></td>
            <td>${App.formatDate(a.appliedAt)}</td>
            <td><span class="badge ${cls}">${label}</span></td>
            <td>
              <a href="job-applicants.html?id=${a.jobId}" class="btn btn-sm btn-light">Xem chi tiết</a>
            </td>
          </tr>
        `;
      }).join('');
    }

    render();
  </script>
</body>
</html>
