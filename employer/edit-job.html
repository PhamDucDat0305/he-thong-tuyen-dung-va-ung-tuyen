<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Sửa tin — JobViệt</title>
    <link rel="stylesheet" href="../css/styles.css" /><link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/pages/dashboard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
  <body><div id="navbar-placeholder"></div>
    <div class="layout-sidebar">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content-area">
        <div class="content-header"><h1><i class="fa-solid fa-pen-to-square"></i> Sửa tin tuyển dụng</h1></div>
        <div
          class="card"
          style="padding: 32px; max-width: 800px"
          id="editForm"
        ></div>
      </main>
    </div>
    <script src="../js/db.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/app.js"></script><script src="../js/navbar.js"></script>
    <script>
      const user = Auth.requireAuth(["employer"]);
      if (!user) throw "r";
      App.renderSidebar("employer", "myjobs");
      const jobId = new URLSearchParams(location.search).get("id");
      const job = DB.getJobById(jobId);
      if (!job || job.createdBy !== user.id) {
        document.getElementById("editForm").innerHTML =
          "<p>Không tìm thấy tin</p>";
      } else {
        document.getElementById("editForm").innerHTML = `
        <form onsubmit="saveJob(event)">
          <div class="form-group"><label class="form-label">Tiêu đề</label><input class="form-input" id="title" value="${job.title}" required></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Mức lương</label><input class="form-input" id="salary" value="${job.salary}" required></div>
            <div class="form-group"><label class="form-label">Địa điểm</label><input class="form-input" id="location" value="${job.location}" required></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Loại hình</label><select class="form-select" id="type"><option ${job.type === "full-time" ? "selected" : ""}>full-time</option><option ${job.type === "part-time" ? "selected" : ""}>part-time</option></select></div>
            <div class="form-group"><label class="form-label">Kinh nghiệm</label><select class="form-select" id="experience"><option ${job.experience === "0-1 năm" ? "selected" : ""}>0-1 năm</option><option ${job.experience === "1-3 năm" ? "selected" : ""}>1-3 năm</option><option ${job.experience === "2-5 năm" ? "selected" : ""}>2-5 năm</option><option ${job.experience === "5+ năm" ? "selected" : ""}>5+ năm</option></select></div>
          </div>
          <div class="form-group"><label class="form-label">Danh mục</label><select class="form-select" id="category"><option ${job.category === "Công nghệ" ? "selected" : ""}>Công nghệ</option><option ${job.category === "Marketing" ? "selected" : ""}>Marketing</option><option ${job.category === "Thiết kế" ? "selected" : ""}>Thiết kế</option><option ${job.category === "Kinh doanh" ? "selected" : ""}>Kinh doanh</option><option ${job.category === "Hành chính" ? "selected" : ""}>Hành chính</option><option ${job.category === "Tài chính" ? "selected" : ""}>Tài chính</option></select></div>
          <div class="form-group"><label class="form-label">Mô tả</label><textarea class="form-textarea" id="description" required>${job.description}</textarea></div>
          <div class="form-group"><label class="form-label">Yêu cầu</label><textarea class="form-textarea" id="requirements" required>${job.requirements}</textarea></div>
          <div class="form-group"><label class="form-label">Quyền lợi</label><textarea class="form-textarea" id="benefits">${job.benefits || ""}</textarea></div>
          <div class="flex" style="gap:12px"><button type="submit" class="btn btn-primary btn-large"><i class="fa-solid fa-floppy-disk"></i> Lưu thay đổi</button><a href="my-jobs.html" class="btn btn-secondary btn-large">Hủy</a></div>
        </form>`;
      }
      function saveJob(e) {
        e.preventDefault();
        DB.updateJob(jobId, {
          title: document.getElementById("title").value.trim(),
          salary: document.getElementById("salary").value.trim(),
          location: document.getElementById("location").value.trim(),
          type: document.getElementById("type").value,
          experience: document.getElementById("experience").value,
          category: document.getElementById("category").value,
          description: document.getElementById("description").value.trim(),
          requirements: document.getElementById("requirements").value.trim(),
          benefits: document.getElementById("benefits").value.trim(),
        });
        Toast.success("Cập nhật thành công!");
        setTimeout(() => (location.href = "my-jobs.html"), 800);
      }
    </script>
  </body>
</html>
