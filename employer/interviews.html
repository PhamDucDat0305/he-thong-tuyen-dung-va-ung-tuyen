<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Lịch phỏng vấn — JobViệt</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/pages/dashboard.css">
</head>
<body>
  <div class="layout-sidebar">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content-area">
      <div class="content-header flex-between">
        <div>
          <h1>📅 Lịch phỏng vấn</h1>
          <p>Quản lý các buổi phỏng vấn sắp tới</p>
        </div>
        <button class="btn btn-primary" onclick="Toast.info('Chức năng đang phát triển')">+ Lên lịch mới</button>
      </div>

      <div class="card animate-fade-up">
        <h3 class="mb-2">Sắp diễn ra</h3>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>Thời gian</th>
                <th>Ứng viên</th>
                <th>Vị trí</th>
                <th>Hình thức / Địa điểm</th>
                <th>Trạng thái</th>
              </tr>
            </thead>
            <tbody id="interviewList">
              <!-- Rendered by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/db.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/app.js"></script>
  <script>
    const user = Auth.requireAuth(['employer']);
    if (!user) throw 'redirect';
    App.renderSidebar('employer', 'interviews');

    const sampleInterviews = [
      { time: "Ngày mai, 10:00 AM", candidate: "Trần Thị Bích", role: "UI/UX Designer", location: "Google Meet", status: "Sắp tới", type: "info" },
      { time: "12/05/2026, 14:30 PM", candidate: "Hoàng Tuấn Kiệt", role: "DevOps Engineer", location: "Tầng 3, Tòa nhà A", status: "Chờ xác nhận", type: "warning" },
      { time: "05/05/2026, 09:00 AM", candidate: "Nguyễn Văn An", role: "Senior Frontend Developer", location: "Google Meet", status: "Đã hoàn thành", type: "success" }
    ];

    document.getElementById('interviewList').innerHTML = sampleInterviews.map(i => `
      <tr>
        <td><strong>${i.time}</strong></td>
        <td>${i.candidate}</td>
        <td>${i.role}</td>
        <td><span class="badge badge-neutral">${i.location}</span></td>
        <td><span class="badge badge-${i.type}">${i.status}</span></td>
      </tr>
    `).join('');
  </script>
</body>
</html>
