<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Dashboard Nhà tuyển dụng — JobViệt</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/pages/dashboard.css">
</head>
<body>
  <div class="layout-sidebar">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content-area">
      <button class="btn btn-icon btn-secondary" onclick="App.toggleSidebar()" style="display:none;margin-bottom:16px" id="sidebarToggle">☰</button>
      <div class="content-header"><h1 id="greeting"></h1><p>Tổng quan hoạt động tuyển dụng</p></div>
      <div class="grid grid-4 stagger" id="stats"></div>
      <div class="grid grid-2 mt-3">
        <div class="card">
          <h3 class="mb-2">📋 Tin tuyển dụng gần đây</h3>
          <div id="recentJobs"></div>
          <a href="my-jobs.html" class="btn btn-ghost mt-2">Xem tất cả →</a>
        </div>
        <div class="card">
          <h3 class="mb-2">📩 Ứng viên mới nhất</h3>
          <div id="recentApps"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/db.js"></script><script src="../js/auth.js"></script><script src="../js/notifications.js"></script><script src="../js/app.js"></script>
  <script>
    const user = Auth.requireAuth(['employer']);
    if(!user) throw 'r';
    App.renderSidebar('employer','dashboard');
    document.getElementById('greeting').textContent = `👋 Xin chào, ${user.fullName}!`;

    const myJobs = DB.getJobsByEmployer(user.id);
    const allApps = myJobs.flatMap(j => DB.getApplicationsByJob(j.id));
    const totalViews = myJobs.reduce((s,j) => s + (j.views||0), 0);

    document.getElementById('stats').innerHTML = `
      <div class="stat-card animate-fade-up"><div class="stat-icon blue">📄</div><div class="stat-value">${myJobs.length}</div><div class="stat-label">Tin đã đăng</div></div>
      <div class="stat-card animate-fade-up"><div class="stat-icon green">📩</div><div class="stat-value">${allApps.length}</div><div class="stat-label">Lượt ứng tuyển</div></div>
      <div class="stat-card animate-fade-up"><div class="stat-icon orange">👁</div><div class="stat-value">${totalViews}</div><div class="stat-label">Lượt xem</div></div>
      <div class="stat-card animate-fade-up"><div class="stat-icon cyan">⏳</div><div class="stat-value">${allApps.filter(a=>a.status==='pending').length}</div><div class="stat-label">Chờ duyệt</div></div>
    `;

    // Recent jobs
    document.getElementById('recentJobs').innerHTML = myJobs.slice(-3).reverse().map(j => `
      <div style="padding:12px 0;border-bottom:1px solid var(--border-light)" class="flex-between">
        <div><strong>${j.title}</strong><br><span style="font-size:.82rem;color:var(--text-light)">${j.salary} · ${j.location}</span></div>
        <span class="badge badge-info">${DB.getApplicationsByJob(j.id).length} CV</span>
      </div>
    `).join('') || '<p style="color:var(--text-light);padding:20px 0">Chưa đăng tin nào</p>';

    // Recent applications
    const recent = allApps.sort((a,b) => new Date(b.appliedAt)-new Date(a.appliedAt)).slice(0,5);
    document.getElementById('recentApps').innerHTML = recent.map(a => {
      const job = DB.getJobById(a.jobId);
      return `<div style="padding:12px 0;border-bottom:1px solid var(--border-light)" class="flex-between">
        <div><strong>${a.fullName}</strong><br><span style="font-size:.82rem;color:var(--text-light)">${job?job.title:'-'} · ${App.timeAgo(a.appliedAt)}</span></div>
        <span class="badge badge-warning">⏳</span>
      </div>`;
    }).join('') || '<p style="color:var(--text-light);padding:20px 0">Chưa có ứng viên</p>';

    // Responsive sidebar toggle
    if (window.innerWidth <= 1024) document.getElementById('sidebarToggle').style.display = 'block';
  </script>
</body></html>
