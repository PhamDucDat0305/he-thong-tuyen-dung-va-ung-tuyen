    <title>Danh sách việc làm</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/pages/job.css" />
    <link rel="stylesheet" href="css/pages/static.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="page-wrapper">
      <div id="navbar-placeholder"></div>
      <section class="hero">
        <div class="container text-center">
          <h1 class="animate-fade-up">
            <i class="fa-solid fa-magnifying-glass"></i> Tìm việc làm
          </h1>
          <p
            class="animate-fade-up"
            style="animation-delay: 0.1s; margin: 0 auto"
          >
            Tìm kiếm và lọc công việc phù hợp với bạn
          </p>
        </div>
      </section>
      <section class="main-content">
        <div class="container">
          <!-- Search & Filters -->
          <div class="filter-bar">
            <div class="search-box" style="flex: 1; max-width: 100%">
              <span class="search-icon"
                ><i class="fa-solid fa-magnifying-glass"></i
              ></span>
              <input
                type="text"
                id="searchInput"
                placeholder="Tìm theo tên việc làm, công ty..."
                oninput="debouncedSearch()"
              />
            </div>
            <select id="filterType" onchange="applyFilters()">
              <option value="">Loại hình</option>
              <option value="full-time">Full-time</option>
              <option value="part-time">Part-time</option>
            </select>
            <select id="filterExp" onchange="applyFilters()">
              <option value="">Kinh nghiệm</option>
              <option value="0-1 năm">0-1 năm</option>
              <option value="1-3 năm">1-3 năm</option>
              <option value="2-5 năm">2-5 năm</option>
            </select>
            <select id="filterCat" onchange="applyFilters()">
              <option value="">Danh mục</option>
              <option value="Công nghệ">Công nghệ</option>
              <option value="Marketing">Marketing</option>
              <option value="Thiết kế">Thiết kế</option>
              <option value="Kinh doanh">Kinh doanh</option>
              <option value="Hành chính">Hành chính</option>
            </select>
            <select id="sortBy" onchange="applyFilters()">
              <option value="newest">Mới nhất</option>
              <option value="salary-desc">Lương cao → thấp</option>
              <option value="salary-asc">Lương thấp → cao</option>
              <option value="views">Xem nhiều nhất</option>
            </select>
            <button class="btn btn-sm btn-ghost" onclick="clearFilters()">
              ✕ Xóa lọc
            </button>
          </div>

          <div class="flex-between mb-2">
            <p
              style="color: var(--text-light); font-size: 0.9rem"
              id="resultCount"
            ></p>
          </div>

          <div class="grid grid-2 stagger" id="jobList"></div>
          <div class="pagination" id="pagination"></div>
        </div>
      </section>
      <footer class="footer" id="footer"></footer>
    </div>
    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script src="js/notifications.js"></script>
    <script type="module" src="js/app.js"></script>
    <script>
      let currentPage = 1;
      const perPage = 8;

      // Read URL params
      const params = new URLSearchParams(location.search);
      if (params.get("q"))
        document.getElementById("searchInput").value = params.get("q");
      if (params.get("cat"))
        document.getElementById("filterCat").value = params.get("cat");

      async function getFilteredJobs() {
        let allJobs = await window.DB.getJobs();
        let jobs = allJobs.filter((j) => j.status === "active");
        const q = document
          .getElementById("searchInput")
          .value.trim()
          .toLowerCase();
        const type = document.getElementById("filterType").value;
        const exp = document.getElementById("filterExp").value;
        const cat = document.getElementById("filterCat").value;
        const sort = document.getElementById("sortBy").value;

        if (q)
          jobs = jobs.filter(
            (j) =>
              (j.title || "").toLowerCase().includes(q) ||
              (j.companyName || "").toLowerCase().includes(q) ||
              (j.location || "").toLowerCase().includes(q),
          );
        if (type) jobs = jobs.filter((j) => j.type === type);
        if (exp) jobs = jobs.filter((j) => j.experience === exp);
        if (cat) jobs = jobs.filter((j) => j.category === cat);

        // Sort
        if (sort === "newest")
          jobs.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        else if (sort === "views") jobs.sort((a, b) => (b.views || 0) - (a.views || 0));
        else if (sort === "salary-desc" || sort === "salary-asc") {
          const getSalaryNum = (s) => parseInt((s.match(/\d+/) || [0])[0]);
          jobs.sort((a, b) =>
            sort === "salary-desc"
              ? getSalaryNum(b.salary) - getSalaryNum(a.salary)
              : getSalaryNum(a.salary) - getSalaryNum(b.salary),
          );
        }
        return jobs;
      }

      async function renderJobs() {
        const listContainer = document.getElementById("jobList");
        listContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 20px;">Đang tải danh sách...</div>';
        
        try {
          const jobs = await getFilteredJobs();
          const { data, totalPages } = window.App.paginate(jobs, currentPage, perPage);
          document.getElementById("resultCount").textContent =
            `Tìm thấy ${jobs.length} việc làm`;

          if (data.length === 0) {
            listContainer.innerHTML =
              `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><h3>Không tìm thấy kết quả</h3><p>Thử thay đổi từ khóa hoặc bộ lọc</p></div>`;
            document.getElementById("pagination").innerHTML = "";
            return;
          }

          const user = window.Auth.getCurrentUser();
          const logos = [
            '<i class="fa-solid fa-laptop-code text-primary"></i>',
            '<i class="fa-solid fa-building text-info"></i>',
            '<i class="fa-solid fa-chart-line text-warning"></i>',
            '<i class="fa-solid fa-palette text-purple"></i>',
            '<i class="fa-solid fa-mobile-screen text-indigo"></i>',
            '<i class="fa-solid fa-rocket text-orange"></i>',
            '<i class="fa-solid fa-bolt text-teal"></i>',
            '<i class="fa-solid fa-star text-pink"></i>',
          ];

          // Fetch saved jobs for the current candidate once to avoid multiple requests
          const savedJobIds = new Set();
          if (user && user.role === "candidate") {
            const saved = await window.DB.getSavedJobs(user.id);
            saved.forEach(s => savedJobIds.add(s.jobId));
          }

          listContainer.innerHTML = data
            .map((job) => {
              const saved = savedJobIds.has(job.id);
              const logo = logos[job.title.length % logos.length];
              return `
            <div class="job-card animate-fade-up">
              <div class="job-header">
                <div class="company-logo">${logo}</div>
                <div style="flex:1">
                  <div class="job-title">${highlightText(job.title)}</div>
                  <div class="job-company">${highlightText(job.companyName)}</div>
                </div>
                ${user && user.role === "candidate" ? `<button class="save-btn ${saved ? "saved" : ""}" onclick="toggleSave('${job.id}', this)" title="${saved ? "Bỏ lưu" : "Lưu việc làm"}"><i class="fa-${saved ? "solid" : "regular"} fa-heart"></i></button>` : ""}
              </div>
              <div class="job-meta">
                <span><i class="fa-solid fa-location-dot text-danger"></i> ${job.location}</span>
                <span><i class="fa-solid fa-money-bill-wave text-success"></i> ${job.salary}</span>
                <span><i class="fa-solid fa-clock text-info"></i> ${job.type}</span>
                <span><i class="fa-solid fa-user-tie text-purple"></i> ${job.experience}</span>
              </div>
              <div class="job-tags">
                <span class="badge badge-primary">${job.category}</span>
                <span class="badge badge-neutral">${job.experience}</span>
              </div>
              <div class="job-actions">
                <a href="job-detail.html?id=${job.id}" class="btn btn-sm btn-primary">Xem chi tiết</a>
                <div class="flex" style="gap:16px;font-size:.82rem;color:var(--text-muted)">
                  <span><i class="fa-solid fa-eye text-warning"></i> ${job.views || 0}</span>
                  <span><i class="fa-solid fa-calendar-days text-indigo"></i> ${window.App.timeAgo(job.createdAt)}</span>
                </div>
              </div>
            </div>`;
            })
            .join("");

          // Pagination
          const pag = document.getElementById("pagination");
          window.App.renderPagination(pag, totalPages, currentPage, window.changePage);
        } catch (error) {
          console.error("Error rendering jobs:", error);
          listContainer.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
            <div class="empty-icon" style="color: var(--danger)">⚠️</div>
            <h3>Lỗi tải dữ liệu</h3>
            <p>Vui lòng kiểm tra quyền truy cập Firestore của bạn.</p>
            <p style="font-size: 0.8rem; color: var(--text-light)">${error.message}</p>
          </div>`;
        }
      }

      window.highlightText = function(text) {
        const q = document.getElementById("searchInput").value.trim();
        if (!q) return text;
        const re = new RegExp(
          `(${q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`,
          "gi",
        );
        return text.replace(
          re,
          '<mark style="background:#FEF08A;padding:1px 2px;border-radius:3px">$1</mark>',
        );
      }

      window.changePage = function(p) {
        currentPage = p;
        renderJobs();
        window.scrollTo({ top: 200, behavior: "smooth" });
      }
      window.applyFilters = function() {
        currentPage = 1;
        renderJobs();
      }
      window.debouncedSearch = window.App.debounce(() => window.applyFilters(), 300);
      window.clearFilters = function() {
        document.getElementById("searchInput").value = "";
        document.getElementById("filterType").value = "";
        document.getElementById("filterExp").value = "";
        document.getElementById("filterCat").value = "";
        document.getElementById("sortBy").value = "newest";
        window.applyFilters();
      }
      window.toggleSave = async function(jobId, btn) {
        const user = window.Auth.getCurrentUser();
        if (!user) {
          location.href = "auth.html";
          return;
        }
        const saved = await window.DB.toggleSaveJob(user.id, jobId);
        btn.classList.toggle("saved", saved);
        Toast.success(saved ? "Đã lưu việc làm ❤️" : "Đã bỏ lưu");
      }

      document.addEventListener("DOMContentLoaded", () => {
        renderJobs();
      });
    </script>
    <script src="js/navbar.js"></script>
  </body>
</html>
