    <title>Liên hệ</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/pages/static.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="page-wrapper">
      <div id="navbar-placeholder"></div>
      <section class="hero">
        <div class="container text-center">
          <h1 class="animate-fade-up">
            <i class="fa-solid fa-envelope-open-text"></i> Liên hệ với chúng tôi
          </h1>
          <p
            class="animate-fade-up"
            style="animation-delay: 0.1s; margin: 0 auto"
          >
            Nếu bạn có câu hỏi hoặc góp ý, hãy gửi cho chúng tôi!
          </p>
        </div>
      </section>
      <section class="main-content">
        <div class="container" style="max-width: 800px">
          <div class="grid grid-3 mb-3">
            <div class="card text-center">
              <div
                style="
                  font-size: 1.8rem;
                  margin-bottom: 8px;
                  color: var(--primary);
                "
              >
                <i class="fa-solid fa-envelope"></i>
              </div>
              <h4>Email</h4>
              <p
                style="
                  color: var(--text-light);
                  font-size: 0.85rem;
                  margin-top: 4px;
                "
              >
                support@jobviet.vn
              </p>
            </div>
            <div class="card text-center">
              <div
                style="font-size: 1.8rem; margin-bottom: 8px; color: #10b981"
              >
                <i class="fa-solid fa-phone"></i>
              </div>
              <h4>Điện thoại</h4>
              <p
                style="
                  color: var(--text-light);
                  font-size: 0.85rem;
                  margin-top: 4px;
                "
              >
                0901 234 567
              </p>
            </div>
            <div class="card text-center">
              <div
                style="font-size: 1.8rem; margin-bottom: 8px; color: #ef4444"
              >
                <i class="fa-solid fa-location-dot"></i>
              </div>
              <h4>Địa chỉ</h4>
              <p
                style="
                  color: var(--text-light);
                  font-size: 0.85rem;
                  margin-top: 4px;
                "
              >
                Hà Nội, Việt Nam
              </p>
            </div>
          </div>
          <div class="card" style="padding: 32px">
            <h3 style="margin-bottom: 20px">Gửi tin nhắn</h3>
            <form onsubmit="submitContact(event)">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Họ tên</label
                  ><input
                    class="form-input"
                    required
                    placeholder="Nguyễn Văn A"
                  />
                </div>
                <div class="form-group">
                  <label class="form-label">Email</label
                  ><input
                    type="email"
                    class="form-input"
                    required
                    placeholder="email@example.com"
                  />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Chủ đề</label
                ><input class="form-input" required placeholder="Nhập chủ đề" />
              </div>
              <div class="form-group">
                <label class="form-label">Nội dung</label
                ><textarea
                  class="form-textarea"
                  required
                  placeholder="Nhập nội dung tin nhắn..."
                ></textarea>
              </div>
              <button
                type="submit"
                class="btn btn-primary btn-large"
                style="width: 100%"
              >
                <i class="fa-solid fa-paper-plane"></i> Gửi tin nhắn
              </button>
            </form>
          </div>
        </div>
      </section>
      <footer class="footer" id="footer"></footer>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/navbar.js"></script>
    <script>
      function submitContact(event) {
        event.preventDefault();
        alert("Cảm ơn bạn đã liên hệ! Chúng tôi sẽ phản hồi sớm nhất có thể.");
        event.target.reset();
      }
    </script>
  </body>
</html>
